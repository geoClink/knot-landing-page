<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Knot</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'knot-purple': '#4f46e5',
            'knot-bg': '#EFEDE8',
            'knot-text': '#18181b',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>

<body class="bg-knot-bg text-knot-text min-h-screen flex flex-col">

  <header class="w-full sticky top-0 bg-knot-bg z-50 border-b border-zinc-300">
    <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">

      <a href="/" class="flex items-center space-x-3 font-black text-xl tracking-tight text-zinc-900 shrink-0">
        <div class="bg-knot-purple text-white p-2.5 rounded-xl flex items-center justify-center shadow-sm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="8" stroke="white" stroke-width="2.5"/>
            <circle cx="12" cy="12" r="3" fill="white"/>
          </svg>
        </div>
        <span>Knot</span>
      </a>

      <nav class="hidden md:flex items-center space-x-12 font-medium text-sm text-zinc-600">
        <a href="/#verticals" class="hover:text-black transition">Verticals</a>
        <a href="/#platform" class="hover:text-black transition">Platform</a>
        <a href="/#onboarding" class="hover:text-black transition">Onboarding</a>
        <a href="/#pricing" class="hover:text-black transition">Pricing</a>
        <a href="/#faq" class="hover:text-black transition">FAQ</a>
      </nav>

      <div class="hidden md:flex items-center space-x-6 font-semibold text-sm shrink-0">
        <a href="#" class="hover:text-zinc-800 transition text-zinc-600">Sign in</a>
        <a href="/#cta-section">
          <button class="bg-knot-purple hover:bg-indigo-700 active:scale-95 text-white px-6 py-2.5 rounded-full transition-all duration-200 shadow-sm hover:shadow cursor-pointer border-none outline-none">
            Contact us
          </button>
        </a>
      </div>

      <button id="hamburger-btn" onclick="toggleMobileMenu()" class="md:hidden flex flex-col gap-[5px] p-1 cursor-pointer bg-transparent border-none outline-none">
        <span class="block w-5 h-0.5 bg-zinc-800 rounded transition-all duration-300"></span>
        <span class="block w-5 h-0.5 bg-zinc-800 rounded transition-all duration-300"></span>
        <span class="block w-5 h-0.5 bg-zinc-800 rounded transition-all duration-300"></span>
      </button>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-knot-bg border-t border-zinc-200 px-6 pt-2 pb-6 space-y-4">
      <nav class="flex flex-col font-medium text-base text-zinc-700">
        <a href="/#verticals" class="hover:text-black transition py-3.5 border-b border-zinc-200">Verticals</a>
        <a href="/#platform" class="hover:text-black transition py-3.5 border-b border-zinc-200">Platform</a>
        <a href="/#onboarding" class="hover:text-black transition py-3.5 border-b border-zinc-200">Onboarding</a>
        <a href="/#pricing" class="hover:text-black transition py-3.5 border-b border-zinc-200">Pricing</a>
        <a href="/#faq" class="hover:text-black transition py-3.5">FAQ</a>
      </nav>
      <div class="flex flex-col gap-3 pt-2 border-t border-zinc-200">
        <a href="#" class="text-zinc-600 font-semibold text-center py-3">Sign in</a>
        <a href="/#cta-section">
          <button class="w-full bg-knot-purple hover:bg-indigo-700 text-white font-semibold px-6 py-3.5 rounded-full cursor-pointer border-none">Contact us</button>
        </a>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-24">
    <div class="text-center max-w-lg space-y-8">

      <!-- Receipt-style 404 -->
      <div class="inline-block">
        <div class="bg-white rounded-2xl px-8 py-6 shadow-sm border border-zinc-200 space-y-1 font-mono text-left">
          <div class="text-[10px] tracking-widest text-zinc-400 uppercase text-center pb-3 border-b border-dashed border-zinc-200">KNOT SYSTEM</div>
          <div class="pt-3 space-y-1 text-sm text-zinc-500">
            <div class="flex justify-between gap-8"><span>Status</span><span class="text-zinc-800 font-semibold">404</span></div>
            <div class="flex justify-between gap-8"><span>Page</span><span class="text-zinc-800 font-semibold">Not found</span></div>
            <div class="flex justify-between gap-8"><span>Clocked out</span><span class="text-zinc-800 font-semibold">Early</span></div>
          </div>
          <div class="pt-3 border-t border-dashed border-zinc-200 text-[10px] tracking-widest text-zinc-400 uppercase text-center">— — — — — —</div>
        </div>
      </div>

      <div class="space-y-3">
        <h1 class="text-3xl md:text-4xl font-black text-zinc-900 tracking-tight leading-tight">
          This page clocked out early.
        </h1>
        <p class="text-zinc-500 font-medium text-base leading-relaxed">
          It's not coming back in. Head back to the counter.
        </p>
      </div>

      <a href="/">
        <button class="bg-knot-purple hover:bg-indigo-700 active:scale-95 text-white font-semibold px-8 py-4 rounded-full transition-all duration-200 shadow-sm cursor-pointer border-none">
          Back to Knot
        </button>
      </a>

    </div>
  </main>

  <footer class="w-full bg-zinc-50 border-t border-zinc-300 py-10">
    <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <a href="/" class="flex items-center space-x-3 font-black text-base tracking-tight text-zinc-900">
        <div class="bg-indigo-600 text-white p-2 rounded-lg flex items-center justify-center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="8" stroke="white" stroke-width="2.5"/>
            <circle cx="12" cy="12" r="3" fill="white"/>
          </svg>
        </div>
        <span>Knot</span>
      </a>
      <p class="text-zinc-400 text-xs font-medium">© 2026 Knot. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function toggleMobileMenu() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    }
  </script>

</body>

</html>
